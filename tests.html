<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סטודיו דמויות - דניאלה</title>
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Varela+Round&family=Karantina:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Varela Round',sans-serif;background:#FFF9FB;color:#2D1B69;direction:rtl;min-height:100vh;overflow-x:hidden}
    .hdr{background:linear-gradient(135deg,#F3E5F5,#FFE5EC,#FFF3E0);padding:2rem 1rem;text-align:center;border-radius:0 0 40px 40px;margin-bottom:2rem}
    .hdr h1{font-family:'Secular One',sans-serif;font-size:1.8rem;margin-bottom:0.3rem}
    .hdr p{font-size:0.9rem;color:#6C5CE7;opacity:0.8}
    .back{display:inline-block;margin-top:0.8rem;color:#FF6B9D;text-decoration:none;font-size:0.85rem}
    .sec{max-width:700px;margin:0 auto 3rem;padding:0 1rem}
    .sec h2{font-family:'Secular One',sans-serif;font-size:1.3rem;margin-bottom:1rem;text-align:center;color:#6C5CE7}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
    .card{background:#fff;border-radius:20px;padding:1.2rem;text-align:center;box-shadow:0 4px 20px rgba(109,92,231,0.1);transition:transform 0.2s}
    .card:hover{transform:translateY(-3px)}
    .card .lbl{font-family:'Secular One',sans-serif;font-size:0.85rem;color:#2D1B69;margin-top:0.6rem}
    .card .sub{font-size:0.7rem;color:#6C5CE7;opacity:0.7;margin-top:0.15rem}

    /* ===== CSS ART BABY ===== */
    .css-baby{position:relative;width:60px;height:90px;margin:0 auto}
    .css-baby .head{width:40px;height:40px;background:#FDDCB5;border-radius:50%;position:absolute;top:8px;left:10px;z-index:2}
    .css-baby .hair{position:absolute;top:2px;left:12px;width:36px;height:22px;background:#E8B84A;border-radius:50% 50% 0 0;z-index:3}
    .css-baby .ponytail{position:absolute;top:-6px;left:24px;width:12px;height:14px;background:#E8B84A;border-radius:50% 50% 40% 40%;z-index:4}
    .css-baby .eye{width:4px;height:5px;background:#2D1B69;border-radius:50%;position:absolute;top:24px;z-index:5}
    .css-baby .eye.l{left:20px}
    .css-baby .eye.r{left:36px}
    .css-baby .eye::after{content:'';position:absolute;top:0;right:0;width:2px;height:2px;background:white;border-radius:50%}
    .css-baby .blush{width:6px;height:4px;background:#FFB0C8;border-radius:50%;position:absolute;top:29px;z-index:5;opacity:0.7}
    .css-baby .blush.l{left:16px}
    .css-baby .blush.r{left:38px}
    .css-baby .mouth{width:6px;height:3px;border-bottom:2px solid #E85A7A;border-radius:0 0 50% 50%;position:absolute;top:31px;left:27px;z-index:5}
    .css-baby .dress{position:absolute;top:46px;left:12px;width:36px;height:28px;background:#FFB0C8;border-radius:4px 4px 12px 12px;z-index:1;clip-path:polygon(15% 0,85% 0,100% 100%,0 100%)}
    .css-baby .dot{width:4px;height:4px;background:white;border-radius:50%;position:absolute;z-index:2}
    .css-baby .dot.d1{top:54px;left:24px}
    .css-baby .dot.d2{top:60px;left:34px}
    .css-baby .dot.d3{top:66px;left:22px}
    .css-baby .arm{width:6px;height:18px;background:#FDDCB5;border-radius:3px;position:absolute;top:48px;z-index:0}
    .css-baby .arm.l{left:8px;transform:rotate(15deg)}
    .css-baby .arm.r{left:46px;transform:rotate(-15deg)}
    .css-baby .leg{width:6px;height:12px;background:#FDDCB5;border-radius:3px;position:absolute;top:72px;z-index:0}
    .css-baby .leg.l{left:20px}
    .css-baby .leg.r{left:34px}
    .css-baby .shoe{width:8px;height:5px;background:#FF8FAF;border-radius:3px 3px 3px 0;position:absolute;top:83px;z-index:0}
    .css-baby .shoe.l{left:18px}
    .css-baby .shoe.r{left:34px}

    /* Wave variant */
    .css-baby.wave .arm.r{transform:rotate(-80deg);transform-origin:bottom center;top:34px;left:48px}

    /* ===== SVG BABY ===== */
    .svg-wrap{display:flex;justify-content:center}
    .svg-wrap svg{width:70px;height:100px}

    /* ===== GRADIENT GHOST ===== */
    .ghost-baby{width:60px;height:80px;margin:0 auto;position:relative}
    .ghost-body{width:60px;height:80px;background:linear-gradient(180deg,rgba(180,160,255,0.7) 0%,rgba(255,180,210,0.4) 60%,rgba(255,180,210,0) 100%);border-radius:30px 30px 20px 20px;position:relative;animation:ghostFloat 3s ease-in-out infinite}
    .ghost-body::before{content:'';position:absolute;top:20px;left:16px;width:6px;height:6px;background:white;border-radius:50%;box-shadow:22px 0 0 white}
    .ghost-body::after{content:'';position:absolute;top:22px;left:18px;width:3px;height:3px;background:#6C5CE7;border-radius:50%;box-shadow:22px 0 0 #6C5CE7}
    @keyframes ghostFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ===== ENERGY BABY ===== */
    .energy-baby{width:60px;height:80px;margin:0 auto;position:relative}
    .energy-core{width:50px;height:70px;margin:0 auto;border-radius:25px 25px 15px 15px;background:radial-gradient(ellipse at center,rgba(0,255,220,0.9) 0%,rgba(0,200,255,0.6) 40%,rgba(100,0,255,0.3) 70%,transparent 100%);animation:energyPulse 2s ease-in-out infinite;position:relative}
    .energy-core::before{content:'✦';position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:18px;color:white;text-shadow:0 0 10px cyan,0 0 20px cyan}
    .energy-core::after{content:'';position:absolute;inset:-6px;border-radius:30px;box-shadow:0 0 15px rgba(0,255,200,0.5),0 0 30px rgba(0,200,255,0.3);animation:energyRing 1.5s ease-in-out infinite alternate}
    @keyframes energyPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.05);filter:brightness(1.3)}}
    @keyframes energyRing{0%{box-shadow:0 0 15px rgba(0,255,200,0.5),0 0 30px rgba(0,200,255,0.3)}100%{box-shadow:0 0 25px rgba(0,255,200,0.8),0 0 50px rgba(0,200,255,0.4)}}

    /* ===== PEEK DEMOS ===== */
    .peek-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem}
    .peek-scene{position:relative;background:white;border-radius:20px;padding:1rem;box-shadow:0 4px 20px rgba(109,92,231,0.1);height:220px;overflow:visible;cursor:pointer}
    .peek-card-el{position:absolute;background:linear-gradient(135deg,#6C5CE7,#FF6B9D);border-radius:16px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Secular One',sans-serif;font-size:0.85rem;z-index:2;box-shadow:0 4px 16px rgba(108,92,231,0.25)}
    .peek-baby-el{position:absolute;z-index:1;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1)}
    .peek-scene:hover .peek-baby-el{transform:var(--peek-hover)}
    .peek-lbl{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:0.7rem;color:#6C5CE7;opacity:0.6;white-space:nowrap}

    /* ===== INTERACTIVE ===== */
    .interact{position:relative;background:linear-gradient(135deg,#F3E5F5,#FFE5EC);border-radius:24px;padding:2rem;min-height:280px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;box-shadow:0 4px 20px rgba(109,92,231,0.1);cursor:pointer;overflow:hidden}
    .interact .hint{font-size:0.85rem;color:#6C5CE7;opacity:0.6}
    .bubble{position:absolute;background:white;border:3px solid #2D1B69;padding:5px 10px;font-family:'Secular One',sans-serif;font-size:13px;color:#2D1B69;white-space:nowrap;opacity:0;transition:opacity 0.3s;z-index:10;pointer-events:none}
    .bubble.show{opacity:1}
    .bubble::after{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:9px solid #2D1B69}

    /* ===== PIXEL ART (canvas) ===== */
    canvas{image-rendering:pixelated;display:block}
  </style>
</head>
<body>
  <header class="hdr">
    <h1>🎨 סטודיו דמויות</h1>
    <p>עיצובים שונים לתינוקת דניאלה</p>
    <a href="index.html" class="back">← חזרה לאתר</a>
  </header>

  <!-- 1. CSS ART -->
  <section class="sec">
    <h2>CSS Art - תינוקת מ-CSS</h2>
    <div class="grid" id="cssGrid"></div>
  </section>

  <!-- 2. SVG -->
  <section class="sec">
    <h2>SVG - וקטורי</h2>
    <div class="grid" id="svgGrid"></div>
  </section>

  <!-- 3. SPECIAL EFFECTS -->
  <section class="sec">
    <h2>רוח רפאים ואנרגיה</h2>
    <div class="grid" id="fxGrid"></div>
  </section>

  <!-- 4. PIXEL ART -->
  <section class="sec">
    <h2>פיקסל ארט - משופר</h2>
    <div class="grid" id="pixelGrid"></div>
  </section>

  <!-- 5. PEEK DEMOS -->
  <section class="sec">
    <h2>הצצה מאחורי כרטיס</h2>
    <div class="peek-grid" id="peekGrid"></div>
  </section>

  <!-- 6. INTERACTIVE -->
  <section class="sec">
    <h2>אינטראקטיבי - לחצו!</h2>
    <div class="interact" id="interactScene">
      <span class="hint">👆 לחצו כאן</span>
    </div>
  </section>

<script>
(function(){
  // ==========================================
  // 1. CSS ART BABIES
  // ==========================================
  function makeCssBaby(variant) {
    var b = document.createElement('div');
    b.className = 'css-baby' + (variant ? ' '+variant : '');
    b.innerHTML =
      '<div class="ponytail"></div><div class="hair"></div><div class="head"></div>' +
      '<div class="eye l"></div><div class="eye r"></div>' +
      '<div class="blush l"></div><div class="blush r"></div>' +
      '<div class="mouth"></div>' +
      '<div class="dress"></div>' +
      '<div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div>' +
      '<div class="arm l"></div><div class="arm r"></div>' +
      '<div class="leg l"></div><div class="leg r"></div>' +
      '<div class="shoe l"></div><div class="shoe r"></div>';
    return b;
  }

  var cssGrid = document.getElementById('cssGrid');
  [{lbl:'עומדת',v:''},{lbl:'מנופפת',v:'wave'}].forEach(function(cfg){
    var card = document.createElement('div');
    card.className = 'card';
    card.appendChild(makeCssBaby(cfg.v));
    var l = document.createElement('div'); l.className='lbl'; l.textContent=cfg.lbl;
    card.appendChild(l);
    var s = document.createElement('div'); s.className='sub'; s.textContent='CSS בלבד';
    card.appendChild(s);
    cssGrid.appendChild(card);
  });

  // ==========================================
  // 2. SVG BABIES
  // ==========================================
  var svgBaby = '<svg viewBox="0 0 70 100" xmlns="http://www.w3.org/2000/svg">' +
    '<ellipse cx="35" cy="22" rx="18" ry="18" fill="#FDDCB5"/>' + // head
    '<ellipse cx="35" cy="10" rx="16" ry="10" fill="#E8B84A"/>' + // hair
    '<ellipse cx="35" cy="-2" rx="6" ry="8" fill="#E8B84A"/>' + // ponytail
    '<circle cx="28" cy="24" r="2.5" fill="#2D1B69"/>' + // eye L
    '<circle cx="42" cy="24" r="2.5" fill="#2D1B69"/>' + // eye R
    '<circle cx="27.5" cy="23" r="1" fill="white"/>' + // sparkle L
    '<circle cx="41.5" cy="23" r="1" fill="white"/>' + // sparkle R
    '<ellipse cx="23" cy="28" rx="3" ry="2" fill="#FFB0C8" opacity="0.5"/>' + // blush L
    '<ellipse cx="47" cy="28" rx="3" ry="2" fill="#FFB0C8" opacity="0.5"/>' + // blush R
    '<path d="M31 30 Q35 34 39 30" stroke="#E85A7A" stroke-width="1.5" fill="none" stroke-linecap="round"/>' + // smile
    '<path d="M22 42 L35 42 L48 42 L52 72 L18 72 Z" fill="#FFB0C8"/>' + // dress
    '<circle cx="30" cy="55" r="2" fill="white"/>' + // dot
    '<circle cx="40" cy="60" r="2" fill="white"/>' + // dot
    '<rect x="16" y="44" width="6" height="18" rx="3" fill="#FDDCB5"/>' + // arm L
    '<rect x="48" y="44" width="6" height="18" rx="3" fill="#FDDCB5"/>' + // arm R
    '<rect x="26" y="70" width="6" height="14" rx="3" fill="#FDDCB5"/>' + // leg L
    '<rect x="38" y="70" width="6" height="14" rx="3" fill="#FDDCB5"/>' + // leg R
    '<ellipse cx="28" cy="86" rx="5" ry="3" fill="#FF8FAF"/>' + // shoe L
    '<ellipse cx="42" cy="86" rx="5" ry="3" fill="#FF8FAF"/>' + // shoe R
    '</svg>';

  var svgWave = '<svg viewBox="0 0 70 100" xmlns="http://www.w3.org/2000/svg">' +
    '<ellipse cx="35" cy="22" rx="18" ry="18" fill="#FDDCB5"/>' +
    '<ellipse cx="35" cy="10" rx="16" ry="10" fill="#E8B84A"/>' +
    '<ellipse cx="35" cy="-2" rx="6" ry="8" fill="#E8B84A"/>' +
    '<circle cx="28" cy="24" r="2.5" fill="#2D1B69"/>' +
    '<circle cx="42" cy="24" r="2.5" fill="#2D1B69"/>' +
    '<circle cx="27.5" cy="23" r="1" fill="white"/>' +
    '<circle cx="41.5" cy="23" r="1" fill="white"/>' +
    '<ellipse cx="23" cy="28" rx="3" ry="2" fill="#FFB0C8" opacity="0.5"/>' +
    '<ellipse cx="47" cy="28" rx="3" ry="2" fill="#FFB0C8" opacity="0.5"/>' +
    '<path d="M31 30 Q35 34 39 30" stroke="#E85A7A" stroke-width="1.5" fill="none" stroke-linecap="round"/>' +
    '<path d="M22 42 L35 42 L48 42 L52 72 L18 72 Z" fill="#FFB0C8"/>' +
    '<circle cx="30" cy="55" r="2" fill="white"/><circle cx="40" cy="60" r="2" fill="white"/>' +
    '<rect x="16" y="44" width="6" height="18" rx="3" fill="#FDDCB5"/>' +
    '<rect x="48" y="28" width="6" height="18" rx="3" fill="#FDDCB5" transform="rotate(-60 51 37)"/>' +
    '<rect x="26" y="70" width="6" height="14" rx="3" fill="#FDDCB5"/>' +
    '<rect x="38" y="70" width="6" height="14" rx="3" fill="#FDDCB5"/>' +
    '<ellipse cx="28" cy="86" rx="5" ry="3" fill="#FF8FAF"/>' +
    '<ellipse cx="42" cy="86" rx="5" ry="3" fill="#FF8FAF"/>' +
    '</svg>';

  var svgGrid = document.getElementById('svgGrid');
  [{lbl:'עומדת',svg:svgBaby},{lbl:'מנופפת',svg:svgWave}].forEach(function(cfg){
    var card = document.createElement('div'); card.className='card';
    var w = document.createElement('div'); w.className='svg-wrap'; w.innerHTML=cfg.svg;
    card.appendChild(w);
    var l = document.createElement('div'); l.className='lbl'; l.textContent=cfg.lbl;
    card.appendChild(l);
    var s = document.createElement('div'); s.className='sub'; s.textContent='SVG וקטורי';
    card.appendChild(s);
    svgGrid.appendChild(card);
  });

  // ==========================================
  // 3. GHOST & ENERGY
  // ==========================================
  var fxGrid = document.getElementById('fxGrid');

  // Ghost
  var gc = document.createElement('div'); gc.className='card';
  var gb = document.createElement('div'); gb.className='ghost-baby';
  gb.innerHTML='<div class="ghost-body"></div>';
  gc.appendChild(gb);
  gc.innerHTML+='<div class="lbl">רוח רפאים</div><div class="sub">גרדיאנט שקוף</div>';
  fxGrid.appendChild(gc);

  // Energy
  var ec = document.createElement('div'); ec.className='card';
  var eb = document.createElement('div'); eb.className='energy-baby';
  eb.innerHTML='<div class="energy-core"></div>';
  ec.appendChild(eb);
  ec.innerHTML+='<div class="lbl">אנרגיה</div><div class="sub">זוהר דינמי</div>';
  fxGrid.appendChild(ec);

  // ==========================================
  // 4. PIXEL ART (improved)
  // ==========================================
  var C = {'.':null,'H':'#E8B84A','h':'#D0982A','S':'#FDDCB5','s':'#EDB78E',
    'E':'#2D1B69','M':'#FF8FA0','L':'#E85A7A','P':'#FFB0C8','p':'#FF8FAF',
    'W':'#FFFFFF','R':'#FF8FAF'};

  var IDLE = [
    '.....HH.....',
    '....hHHh....',
    '...HHHHHH...',
    '..HHHHHHHH..',
    '..HhSSSSHh..',
    '..HSSSSSSH..',
    '..SSESSESS..',
    '..SSSSSSSS..',
    '..SMSSSSMS..',
    '....SLLS....',
    '....SSSS....',
    '...pPPPPp...',
    '..SpPWPWpS..',
    '..SpPPPPpS..',
    '...pPPPPp...',
    '....SS.SS...',
    '....RR.RR...',
  ];

  function renderPx(sprite, scale) {
    var cv = document.createElement('canvas');
    var rows=sprite.length, cols=sprite[0].length;
    cv.width=cols*scale; cv.height=rows*scale;
    cv.style.imageRendering='pixelated'; cv.style.display='block'; cv.style.margin='0 auto';
    var ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
    for(var y=0;y<rows;y++) for(var x=0;x<cols;x++){
      var c=C[sprite[y][x]]; if(c){ctx.fillStyle=c;ctx.fillRect(x*scale,y*scale,scale,scale);}
    }
    return cv;
  }

  var pixelGrid = document.getElementById('pixelGrid');
  [3,4,5,6].forEach(function(sc){
    var card=document.createElement('div'); card.className='card';
    card.appendChild(renderPx(IDLE,sc));
    var l=document.createElement('div');l.className='lbl';l.textContent='סקייל ×'+sc;
    card.appendChild(l);
    var s=document.createElement('div');s.className='sub';s.textContent=(12*sc)+'×'+(17*sc)+'px';
    card.appendChild(s);
    pixelGrid.appendChild(card);
  });

  // ==========================================
  // 5. PEEK DEMOS
  // ==========================================
  var peekGrid = document.getElementById('peekGrid');

  function peekDemo(cardPos,babyPos,babyDefault,babyHover,label){
    var scene=document.createElement('div'); scene.className='peek-scene';
    var c=document.createElement('div'); c.className='peek-card-el';
    c.style.cssText=cardPos; c.textContent='כרטיס מילה';
    scene.appendChild(c);
    var bw=document.createElement('div'); bw.className='peek-baby-el';
    bw.style.cssText=babyDefault; bw.style.setProperty('--peek-hover',babyHover);
    bw.appendChild(makeCssBaby(''));
    scene.appendChild(bw);
    var lb=document.createElement('div');lb.className='peek-lbl';lb.textContent=label;
    scene.appendChild(lb);
    scene.addEventListener('click',function(){scene.classList.toggle('active');
      if(scene.classList.contains('active'))bw.style.transform=babyHover;
      else bw.style.transform='';});
    return scene;
  }

  peekGrid.appendChild(peekDemo(
    'top:30px;right:60px;width:130px;height:130px;',
    'top:60px;right:25px;transform:translateX(25px);',
    'top:60px;right:25px;transform:translateX(25px);',
    'translateX(-5px)','הצצה מימין'));

  peekGrid.appendChild(peekDemo(
    'top:20px;left:50%;transform:translateX(-50%);width:150px;height:100px;',
    'top:100px;left:50%;transform:translate(-50%,20px);',
    'top:100px;left:50%;transform:translate(-50%,20px);',
    'translate(-50%,-5px)','הצצה מלמטה'));

  peekGrid.appendChild(peekDemo(
    'top:30px;left:30px;width:130px;height:110px;',
    'top:95px;left:5px;transform:translate(0,15px) rotate(-8deg);',
    'top:95px;left:5px;transform:translate(0,15px) rotate(-8deg);',
    'translate(0,-5px) rotate(-5deg)','הצצה באלכסון'));

  // ==========================================
  // 6. INTERACTIVE
  // ==========================================
  var iScene=document.getElementById('interactScene');
  var msgs=['!היי','!אני דניאלה','!בואו נשחק','!גדלתי','💕'];
  var mi=0, ibusy=false;

  iScene.addEventListener('click',function(){
    if(ibusy)return; ibusy=true;
    var hint=iScene.querySelector('.hint'); if(hint)hint.style.display='none';

    var wrap=document.createElement('div');
    wrap.style.cssText='position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);z-index:5';
    wrap.appendChild(makeCssBaby('wave'));
    var bub=document.createElement('div');bub.className='bubble';
    bub.style.cssText='bottom:calc(100% + 8px);left:50%;transform:translateX(-50%)';
    wrap.appendChild(bub);
    iScene.appendChild(wrap);

    setTimeout(function(){wrap.style.bottom='30px';},50);
    setTimeout(function(){bub.textContent=msgs[mi];bub.classList.add('show');mi=(mi+1)%msgs.length;},700);
    setTimeout(function(){bub.classList.remove('show');},2800);
    setTimeout(function(){wrap.style.bottom='-100px';},3200);
    setTimeout(function(){iScene.removeChild(wrap);ibusy=false;
      var h2=document.createElement('span');h2.className='hint';h2.textContent='👆 לחצו שוב';
      iScene.appendChild(h2);},3800);
  });
})();
</script>
</body>
</html>
