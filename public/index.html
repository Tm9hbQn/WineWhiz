<!DOCTYPE html>
<html>
  <head>
    <title>Chat Interface</title>
    <link rel="stylesheet" href="./css/style.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src">

  </head>

  <body>
    <div id="chat-window">
      <div id="messages"></div>

      <div id="user-input">
        <input type="text" id="user-message" placeholder="Type your message...">

      </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    
    <script src="./js/main.js"></script>
  </body>
</html>
